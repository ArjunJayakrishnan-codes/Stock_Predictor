{% extends "base.html" %}
{% block title %}Error{% endblock %}
{% block content %}
<div class="text-center py-5">
  <i class="bi bi-exclamation-triangle-fill" style="font-size:3.5rem; color:var(--accent-red);"></i>
  <h2 class="mt-3" style="font-weight:700;">Something went wrong</h2>
  <p class="text-muted-custom mt-2">Could not analyze <strong class="mono">{{ symbol }}</strong></p>
  <div class="card-dark2 d-inline-block px-4 py-3 mt-3 mono" style="font-size:0.85rem; color:var(--accent-red); max-width:600px;">
    {{ error }}
  </div>
  <br>
  <a href="/" class="btn-primary-custom btn mt-4">
    <i class="bi bi-arrow-left me-2"></i>Try Again
  </a>
</div>
{% endblock %}
